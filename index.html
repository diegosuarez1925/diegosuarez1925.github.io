<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <link rel="stylesheet" href="style.css"/>
  <script type="importmap">
  {
    "imports": {
      "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
      "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@4/dist/vue-router.esm-browser.prod.js",
      "@graffiti-garden/implementation-local": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-local@1.2.0/dist/browser/index.js",
      "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
      "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
    }
  }
  </script>
  <script src="index.js" type="module"></script>
</head>
<body>
<div id="app"><div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#585048;font-family:monospace;font-size:13px">Loading…</div></div>

<template id="template">

  <!-- ── LOGIN ─────────────────────────────────────────────────── -->
  <template v-if="!$graffitiSession.value">
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">E<em>MIT</em></div>
        <p class="login-tagline">Communication for MIT students,<br/>done easier.</p>
        <button class="btn btn-primary" @click="$graffiti.login()">Sign In to Continue</button>
      </div>
    </div>
  </template>

  <!-- ── APP ───────────────────────────────────────────────────── -->
  <template v-else>

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <span class="brand-name">EMIT</span>
        <span class="brand-tag">Beta</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <!-- Clickable chip → quick profile edit -->
        <button class="user-chip" @click="openProfileQuickEdit()" title="Edit your profile">
          <span class="user-dot"></span>
          <actor-handle :actor="$graffitiSession.value.actor"/>
          <span class="chip-edit-icon">✎</span>
        </button>
        <button class="btn btn-sm" @click="$graffiti.logout($graffitiSession.value)">Sign Out</button>
      </div>
    </header>

    <!-- Horizontal Tab Bar -->
    <nav class="tabbar">
      <button class="tab-btn" :class="{active: tab==='chats'}" @click="setTab('chats')">
        <span class="tab-icon">✉</span> Chats
      </button>
      <button class="tab-btn" :class="{active: tab==='study'}" @click="setTab('study')">
        <span class="tab-icon">◈</span> Study
      </button>
      <button class="tab-btn" :class="{active: tab==='connect'}" @click="setTab('connect')">
        <span class="tab-icon">⊕</span> Connect
      </button>
    </nav>

    <!-- Shell -->
    <div class="shell">
      <!-- router-view is required by Vue Router to enable navigation -->
      <router-view style="display:none"></router-view>

      <!-- ════════════════ CHATS TAB ════════════════════════════ -->
      <template v-if="tab==='chats'">

        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="sidebar-head">
            <div class="sidebar-head-row">
              <span class="sidebar-title">
                {{ showNewDM ? 'New Message' : 'Direct Messages' }}
              </span>
              <button class="btn btn-xs" @click="showNewDM=!showNewDM; dmSearch=''">
                {{ showNewDM ? '✕ Cancel' : '+ New' }}
              </button>
            </div>
            <div class="search-wrap">
              <span class="search-icon">⌕</span>
              <input
                class="search-field"
                v-model="dmSearch"
                :placeholder="showNewDM ? 'Find by name…' : 'Search by name…'"
              />
            </div>
            <div class="dm-tag-filter">
              <select class="field" v-model="dmTagDropdown" @change="addDmTag()">
                <option value="">+ Filter by class tag…</option>
                <option v-for="t of availableDmTags" :key="t" :value="t">{{ t }}</option>
              </select>
              <div class="tag-row" v-if="dmTagFilter.length" style="margin-top:6px">
                <span class="tag-pill removable" v-for="t of dmTagFilter" :key="t">
                  {{ t }}
                  <button class="tag-remove" @click="removeDmTag(t)" aria-label="Remove tag">×</button>
                </span>
              </div>
            </div>
          </div>

          <!-- New DM: user picker -->
          <template v-if="showNewDM">
            <div class="user-picker">
              <div v-if="pickerResults.length===0" class="sidebar-empty">No users found.</div>
              <div
                v-for="u of pickerResults" :key="u.actor"
                class="picker-item"
                @click="openOrCreateDM(u.actor, u.displayName); showNewDM=false; dmSearch=''"
              >
                <div class="picker-avatar" @click.stop="openProfile(u.actor)" style="cursor:pointer">{{ u.displayName[0] }}</div>
                <div>
                  <div class="picker-name">{{ u.displayName }}</div>
                  <div class="picker-sub">{{ u.bio }}</div>
                </div>
              </div>
            </div>
          </template>

          <!-- DM list -->
          <template v-else>
            <div class="sidebar-list">
              <div v-if="filteredDMs.length===0" class="sidebar-empty">
                No conversations yet.<br/>Hit <strong>+ New</strong> to start one.
              </div>
              <div
                v-for="conv of filteredDMs" :key="conv.url"
                class="dm-item"
                :class="{active: activeDMChannel===conv.channel}"
                @click="selectDM(conv)"
              >
                <div class="dm-avatar" @click.stop="openProfile(conv.partnerActor)" style="cursor:pointer">{{ conv.partnerName[0].toUpperCase() }}</div>
                <div class="dm-info">
                  <div class="dm-handle" v-if="conv.isDummy">{{ conv.partnerName }}</div>
                  <div class="dm-handle" v-else><actor-handle :actor="conv.partnerActor"/></div>
                  <div class="dm-preview">{{ conv.preview }}</div>
                  <div class="tag-row" v-if="getActorTags(conv.partnerActor).length">
                    <span class="tag-pill" v-for="t of getActorTags(conv.partnerActor).slice(0,3)" :key="t">{{ t }}</span>
                    <span class="tag-more" v-if="getActorTags(conv.partnerActor).length > 3">···</span>
                  </div>
                </div>
                <!-- Leave button for each DM row -->
                <button
                  class="leave-icon-btn"
                  title="Leave conversation"
                  @click.stop="selectDM(conv); $nextTick(() => leaveDM())"
                >✕</button>
              </div>
            </div>
          </template>
        </aside>

        <!-- DM messages -->
        <main class="main">
          <template v-if="!activeDMChannel">
            <div class="empty-chat">
              <div class="empty-glyph">✉</div>
              <div class="empty-label">No conversation open</div>
              <div class="empty-hint">← select or start a new chat</div>
            </div>
          </template>
          <template v-else>
            <div class="chat-top">
              <span class="chat-top-name" v-if="activeDMIsDummy">{{ activeDMPartnerName }}</span>
              <span class="chat-top-name" v-else><actor-handle :actor="activeDMPartnerActor"/></span>
              <span class="badge badge-dm">DM</span>
              <div style="flex:1"></div>
              <button class="btn btn-ghost btn-sm chat-leave-btn" @click="leaveDM()">✕ Leave</button>
            </div>
            <div class="msg-list">
              <template v-if="messagesLoading && !activeDMIsDummy">
                <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
              </template>
              <template v-else>
                <div v-if="activeMessages.length===0" class="empty-chat" style="flex:1">
                  <div class="empty-glyph">[ ]</div>
                  <div class="empty-label">Say hello.</div>
                </div>
                <chat-message
                  v-for="m of activeMessages"
                  :key="m.url"
                  :message="m"
                  :is-own="isMine(m)"
                  :is-deleting="deleting.has(m.url)"
                  @delete="del"
                  @view-profile="openProfile"
                />
              </template>
            </div>
            <div class="input-bar">
              <input class="msg-input" v-model="draft" placeholder="Type a message…" @keyup.enter="send()"/>
              <button class="btn btn-primary" @click="send()" :disabled="!draft.trim()||sending">
                {{ sending ? '…' : 'Send' }}
              </button>
            </div>
          </template>
        </main>
      </template>

      <!-- ════════════════ STUDY TAB ════════════════════════════ -->
      <template v-else-if="tab==='study'">
        <div class="study-wrap">

          <!-- Study sub-tabs -->
          <nav class="study-subtabs">
            <button class="subtab-btn" :class="{active: studySubTab==='join'}"    @click="studySubTab='join'">Join</button>
            <button class="subtab-btn" :class="{active: studySubTab==='create'}"  @click="studySubTab='create'">Create</button>
            <button class="subtab-btn" :class="{active: studySubTab==='session'}" @click="studySubTab='session'">Session Chats</button>
          </nav>

          <!-- ── JOIN sub-tab ─────────────────────────────────── -->
          <template v-if="studySubTab==='join'">
            <div class="join-pane">

              <!-- ── Compact filter panel ───────────────────── -->
              <div class="filter-panel">
                <!-- Always-visible top row: search + Filters toggle + expired toggle + clear -->
                <div class="filter-toggle-row">
                  <div class="search-wrap" style="flex:1;min-width:0">
                    <span class="search-icon">⌕</span>
                    <input
                      class="search-field"
                      v-model="studySearch"
                      placeholder="Search sessions…"
                    />
                  </div>
                  <button
                    class="btn btn-sm filter-toggle-btn"
                    :class="{active: !filterCollapsed}"
                    @click="filterCollapsed = !filterCollapsed"
                  >
                    Filters
                    <span v-if="activeFilterCount" class="filter-badge">{{ activeFilterCount }}</span>
                  </button>
                  <button
                    class="expired-toggle-btn"
                    :class="{active: hideExpired}"
                    @click="hideExpired = !hideExpired"
                    :title="hideExpired ? 'Showing active only — click to show all' : 'Click to hide past sessions'"
                  >
                    {{ hideExpired ? 'Active only' : 'All sessions' }}
                    <span v-if="hideExpired && expiredSessionCount" class="filter-badge">{{ expiredSessionCount }} hidden</span>
                  </button>
                  <button class="btn btn-sm" @click="clearStudyFilters()">Clear</button>
                </div>

                <!-- Collapsible filters -->
                <div class="filter-expanded" v-show="!filterCollapsed">
                  <div class="filter-grid">
                    <div class="filter-cell">
                      <label class="field-label">Class tags</label>
                      <select class="field" v-model="filterTagDropdown" @change="addFilterTag()">
                        <option value="">+ Add a class tag…</option>
                        <option v-for="t of availableFilterTags" :key="t" :value="t">{{ t }}</option>
                      </select>
                      <div class="tag-row" v-if="studyTagFilter.length" style="margin-top:6px">
                        <span class="tag-pill removable" v-for="t of studyTagFilter" :key="t">
                          {{ t }}
                          <button class="tag-remove" @click="removeFilterTag(t)" aria-label="Remove tag">×</button>
                        </span>
                      </div>
                    </div>
                    <div class="filter-cell">
                      <label class="field-label">Date</label>
                      <input class="field" type="date" v-model="studyDateFilter"/>
                    </div>
                    <div class="filter-cell">
                      <label class="field-label">Starts by</label>
                      <input class="field" type="time" v-model="studyStartsBy"/>
                    </div>
                    <div class="filter-cell">
                      <label class="field-label">Ends by</label>
                      <input class="field" type="time" v-model="studyEndsBy"/>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Split: list on left, map on right -->
              <div class="join-split">
                <div class="join-list-col">
                  <div class="session-grid two-col">
                    <div v-if="allGroups.length===0" class="join-empty">No sessions yet. Head to <strong>Create</strong> to make one.</div>
                    <div v-else-if="filteredGroups.length===0" class="join-empty">
                      No sessions match your filters.
                      <span v-if="hideExpired && expiredSessionCount"> ({{ expiredSessionCount }} past sessions hidden)</span>
                    </div>
                    <div
                      v-for="g of filteredGroups" :key="g.url"
                      class="session-card"
                      :class="{joined: isMemberOf(g)}"
                      @click="viewSession(g)"
                    >
                      <div class="session-card-title">{{ g.title }}</div>
                      <div class="tag-row" v-if="g.tags && g.tags.length">
                        <span class="tag-pill" v-for="t of g.tags" :key="t">{{ t }}</span>
                      </div>
                      <div class="session-card-when" v-if="g.date || g.startTime">
                        <span v-if="g.date">{{ fmtDate(g.date) }}</span>
                        <span v-if="g.startTime"> · {{ fmtTime(g.startTime) }}<span v-if="g.endTime">–{{ fmtTime(g.endTime) }}</span></span>
                      </div>
                      <div class="session-card-where" v-if="g.location">📍 {{ g.location }}</div>
                      <div class="session-card-meta">
                        by
                        <span v-if="g.isDummy">{{ g.creatorName }}</span>
                        <actor-handle v-else :actor="g.creatorActor"/>
                        <span v-if="g.isDummy" class="demo-tag">demo</span>
                        <span v-if="isSessionExpired(g)" class="session-expired-tag">Past</span>
                      </div>
                      <div class="session-card-action">
                        {{ isMemberOf(g) ? 'Open details →' : 'View · Join →' }}
                      </div>
                    </div>
                  </div>
                </div>
                <div class="join-map-col">
                  <div class="join-map-header">
                    <span class="join-map-title">Sessions on the map</span>
                    <span class="join-map-sub">{{ filteredGroups.filter(g => g.pinLat != null && g.pinLng != null).length }} / {{ filteredGroups.length }} pinned · click a pin for details</span>
                  </div>
                  <div id="join-map" class="map-container map-container--fill"></div>
                </div>
              </div>
            </div>
          </template>

          <!-- ── CREATE sub-tab ───────────────────────────────── -->
          <template v-else-if="studySubTab==='create'">
            <div class="create-pane">
              <div class="create-card">
                <h2 class="create-heading">Create a Study Session</h2>
                <p class="create-sub">Fill in the details below. Fields marked with * are required.</p>

                <div class="form-stack">
                  <div>
                    <label class="field-label">Title *</label>
                    <input class="field" v-model="newGroupTitle" placeholder="e.g. 6.1800 Pset 4 study group"/>
                  </div>
                  <div>
                    <label class="field-label">Description *</label>
                    <textarea class="field" v-model="newGroupDescription" rows="3" style="resize:vertical"
                      placeholder="What will you cover? What should attendees bring?"></textarea>
                  </div>
                  <div>
                    <label class="field-label">Class tags (optional)</label>
                    <select class="field" v-model="newGroupTagDropdown" @change="addCreateTag()">
                      <option value="">+ Add a class tag…</option>
                      <option v-for="t of availableCreateTags" :key="t" :value="t">{{ t }}</option>
                    </select>
                    <div class="tag-row" v-if="newGroupTags.length" style="margin-top:6px">
                      <span class="tag-pill removable" v-for="t of newGroupTags" :key="t">
                        {{ t }}
                        <button class="tag-remove" @click="removeCreateTag(t)" aria-label="Remove tag">×</button>
                      </span>
                    </div>
                  </div>
                  <div class="form-row-3">
                    <div>
                      <label class="field-label">Date *</label>
                      <input class="field" type="date" v-model="newGroupDate"/>
                    </div>
                    <div>
                      <label class="field-label">Start time *</label>
                      <input class="field" type="time" v-model="newGroupStartTime"/>
                    </div>
                    <div>
                      <label class="field-label">End time *</label>
                      <input class="field" type="time" v-model="newGroupEndTime"/>
                    </div>
                  </div>
                  <div>
                    <label class="field-label">Location *</label>
                    <input class="field" v-model="newGroupLocation" placeholder="e.g. Building 32, Room 144 — or a link"/>
                  </div>
                  <div>
                    <label class="field-label">Pin *</label>
                    <p class="field-hint">Click anywhere on the map to drop a pin, or drag the existing pin to fine-tune.</p>
                    <div id="create-map" class="map-container map-container--small"></div>
                    <div class="pin-status">
                      <template v-if="newGroupPinLat != null && newGroupPinLng != null">
                        <div class="pin-status-row">
                          <span class="pin-coord">📍 {{ newGroupPinLat.toFixed(5) }}, {{ newGroupPinLng.toFixed(5) }}</span>
                          <button class="btn btn-xs" @click="clearCreatePin()">Clear pin</button>
                        </div>
                        <div class="pin-address" v-if="newGroupPinAddress">{{ newGroupPinAddress }}</div>
                      </template>
                      <span class="pin-empty" v-else>No pin set yet — click on the map above.</span>
                    </div>
                  </div>
                  <div v-if="createError" class="create-error">{{ createError }}</div>
                  <div style="display:flex;gap:8px">
                    <button class="btn btn-primary" @click="createGroup()" :disabled="creatingGroup">
                      {{ creatingGroup ? 'Creating…' : 'Create Session' }}
                    </button>
                    <button class="btn btn-sm" @click="studySubTab='join'">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- ── SESSION CHATS sub-tab ────────────────────────── -->
          <template v-else>
            <div class="study-chat-wrap">

              <!-- Sidebar: joined sessions -->
              <aside class="sidebar">
                <div class="sidebar-head">
                  <div class="sidebar-head-row">
                    <span class="sidebar-title">My Sessions</span>
                    <button class="btn btn-xs" @click="studySubTab='join'">+ Join</button>
                  </div>
                  <div class="search-wrap">
                    <span class="search-icon">⌕</span>
                    <input
                      class="search-field"
                      v-model="studySearch"
                      placeholder="Search by name or tag…"
                    />
                  </div>
                </div>
                <div class="sidebar-list">
                  <div v-if="myJoinedGroups.length===0" class="sidebar-empty">
                    You haven't joined any sessions yet.<br/>Go to <strong>Join</strong> to find one.
                  </div>
                  <div v-else-if="myJoinedGroupsFiltered.length===0" class="sidebar-empty">
                    No matches for "{{ studySearch }}".
                  </div>
                  <div
                    v-for="g of myJoinedGroupsFiltered" :key="g.url"
                    class="group-item" :class="{active: activeStudyChannel===g.channel}"
                    @click="selectGroup(g)"
                  >
                    <div class="group-item-top">
                      <div class="group-title">{{ g.title }}</div>
                      <!-- Leave button — only for real sessions you didn't create -->
                      <button
                        v-if="!g.isDummy && g.creatorActor !== $graffitiSession.value?.actor"
                        class="leave-icon-btn"
                        title="Leave session"
                        @click.stop="leaveSession(g)"
                      >✕</button>
                    </div>
                    <div class="tag-row" v-if="g.tags && g.tags.length" style="margin:3px 0">
                      <span class="tag-pill" v-for="t of g.tags" :key="t">{{ t }}</span>
                    </div>
                    <div class="group-meta">
                      <em>by
                        <span v-if="g.isDummy">{{ g.creatorName }}</span>
                        <actor-handle v-else :actor="g.creatorActor"/>
                      </em>
                      <span v-if="g.isDummy" style="color:var(--text-dim)"> · demo</span>
                    </div>
                  </div>
                </div>
              </aside>

              <!-- Messages -->
              <main class="main">
                <template v-if="!activeStudyChannel">
                  <div class="empty-chat">
                    <div class="empty-glyph">◈</div>
                    <div class="empty-label">No session open</div>
                    <div class="empty-hint">← pick a session, or Join one</div>
                  </div>
                </template>
                <template v-else>
                  <div class="chat-top">
                    <span class="chat-top-name">{{ activeStudyTitle }}</span>
                    <span class="badge badge-grp">Group</span>
                    <div style="flex:1"></div>
                    <!-- Leave button in chat header — only if not creator and not dummy -->
                    <button
                      v-if="activeStudyGroup && !activeStudyGroup.isDummy && activeStudyGroup.creatorActor !== $graffitiSession.value?.actor"
                      class="btn btn-ghost btn-sm chat-leave-btn"
                      @click="leaveSession(activeStudyGroup)"
                    >✕ Leave</button>
                  </div>
                  <div class="msg-list">
                    <template v-if="messagesLoading && !activeStudyIsDummy">
                      <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </template>
                    <template v-else>
                      <div v-if="activeMessages.length===0" class="empty-chat" style="flex:1">
                        <div class="empty-glyph">[ ]</div>
                        <div class="empty-label">Start the session.</div>
                      </div>
                      <chat-message
                        v-for="m of activeMessages"
                        :key="m.url"
                        :message="m"
                        :is-own="isMine(m)"
                        :is-deleting="deleting.has(m.url)"
                        @delete="del"
                        @view-profile="openProfile"
                      />
                    </template>
                  </div>
                  <div class="input-bar">
                    <input class="msg-input" v-model="draft" placeholder="Type a message…" @keyup.enter="send()"/>
                    <button class="btn btn-primary" @click="send()" :disabled="!draft.trim()||sending">
                      {{ sending ? '…' : 'Send' }}
                    </button>
                  </div>
                </template>
              </main>
            </div>
          </template>

        </div>
      </template>

      <!-- ════════════════ CONNECT TAB ══════════════════════════ -->
      <template v-else-if="tab==='connect'">
        <div class="connect-wrap">

          <!-- My Profile panel -->
          <div class="my-profile-panel">
            <div class="panel-section-title">My Profile</div>
            <template v-if="!editingProfile">
              <div class="profile-card">
                <div class="profile-name">{{ myProfile?.value.displayName || '—' }}</div>
                <div class="profile-bio">{{ myProfile?.value.bio || 'No bio set.' }}</div>
                <div class="profile-handle">
                  <actor-handle :actor="$graffitiSession.value.actor"/>
                </div>
              </div>
              <button class="btn btn-sm" style="align-self:flex-start" @click="startEdit()">
                {{ myProfile ? 'Edit Profile' : 'Set Up Profile' }}
              </button>
            </template>
            <template v-else>
              <div class="profile-form">
                <div>
                  <label class="field-label">Display Name</label>
                  <input class="field" v-model="profileDraft.displayName" placeholder="Your name…"/>
                </div>
                <div>
                  <label class="field-label">Bio</label>
                  <textarea class="field" v-model="profileDraft.bio" placeholder="A short bio…" rows="3" style="resize:none"></textarea>
                </div>
                <div>
                  <label class="field-label">Classes</label>
                  <div class="tag-options">
                    <button v-for="t of TAG_OPTIONS" :key="t"
                      class="tag-option" :class="{selected: profileDraft.tags && profileDraft.tags.includes(t)}"
                      @click="toggleProfileTag(t)">{{ t }}</button>
                  </div>
                </div>
                <div style="display:flex;gap:8px">
                  <button class="btn btn-primary btn-sm" @click="saveProfile()" :disabled="savingProfile">
                    {{ savingProfile ? 'Saving…' : 'Save' }}
                  </button>
                  <button class="btn btn-sm" @click="editingProfile=false">Cancel</button>
                </div>
              </div>
            </template>
          </div>

          <!-- People search -->
          <div class="search-pane">
            <div class="search-head">
              <h2>Find People</h2>
              <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input class="search-field" v-model="searchQ" placeholder="Search by name or bio…"/>
              </div>
            </div>
            <div class="search-results">
              <div v-if="filteredProfiles.length===0" class="no-results">
                {{ searchQ ? `No results for "${searchQ}"` : 'No profiles found.' }}
              </div>
              <div v-for="p of filteredProfiles" :key="p.actor" class="result-item">
                <div class="result-avatar" @click="openProfile(p.actor)" style="cursor:pointer">{{ p.value.displayName[0] }}</div>
                <div class="result-info">
                  <div class="result-name">{{ p.value.displayName }}</div>
                  <div class="result-bio">{{ p.value.bio }}</div>
                  <div class="result-actor" v-if="!p.isDummy">
                    <actor-handle :actor="p.actor"/>
                  </div>
                  <div class="result-actor" v-else>demo account</div>
                </div>
                <button
                  class="btn btn-sm"
                  @click="openOrCreateDM(p.actor, p.value.displayName); setTab('chats')"
                  :disabled="p.actor===$graffitiSession.value.actor"
                >
                  Message
                </button>
              </div>
            </div>
          </div>
        </div>
      </template>

    </div><!-- /shell -->

    <!-- ── Session Details Modal ──────────────────────────────────── -->
    <div v-if="viewingSession" class="profile-modal-overlay" @click.self="closeViewSession()">
      <div class="profile-modal session-modal">
        <button class="profile-modal-close" @click="closeViewSession()">✕</button>
        <div class="session-modal-title">{{ viewingSession.title }}</div>
        <div class="tag-row" v-if="viewingSession.tags && viewingSession.tags.length" style="justify-content:center;margin-bottom:6px">
          <span class="tag-pill" v-for="t of viewingSession.tags" :key="t">{{ t }}</span>
        </div>

        <div class="session-modal-grid">
          <div class="session-modal-row" v-if="viewingSession.date">
            <span class="session-modal-label">Date</span>
            <span class="session-modal-val">{{ fmtDate(viewingSession.date) }}</span>
          </div>
          <div class="session-modal-row" v-if="viewingSession.startTime || viewingSession.endTime">
            <span class="session-modal-label">Time</span>
            <span class="session-modal-val">
              <template v-if="viewingSession.startTime">{{ fmtTime(viewingSession.startTime) }}</template>
              <template v-if="viewingSession.startTime && viewingSession.endTime"> – </template>
              <template v-if="viewingSession.endTime">{{ fmtTime(viewingSession.endTime) }}</template>
            </span>
          </div>
          <div class="session-modal-row" v-if="viewingSession.location">
            <span class="session-modal-label">Location</span>
            <span class="session-modal-val">{{ viewingSession.location }}</span>
          </div>
          <div class="session-modal-row" v-if="viewingSession.pinAddress">
            <span class="session-modal-label">Address</span>
            <span class="session-modal-val">{{ viewingSession.pinAddress }}</span>
          </div>
          <div class="session-modal-row">
            <span class="session-modal-label">Organizer</span>
            <span class="session-modal-val">
              <span v-if="viewingSession.isDummy">{{ viewingSession.creatorName }}</span>
              <actor-handle v-else :actor="viewingSession.creatorActor"/>
              <span v-if="viewingSession.isDummy" class="demo-tag">demo</span>
            </span>
          </div>
          <div class="session-modal-row" v-if="isSessionExpired(viewingSession)">
            <span class="session-modal-label">Status</span>
            <span class="session-modal-val"><span class="session-expired-tag">Past session</span></span>
          </div>
        </div>

        <div class="session-modal-section" v-if="viewingSession.description">
          <div class="session-modal-section-title">About</div>
          <div class="session-modal-desc">{{ viewingSession.description }}</div>
        </div>

        <div class="session-modal-section">
          <div class="session-modal-section-title">
            Joined ({{ getSessionMembers(viewingSession).length }})
          </div>
          <div class="member-list">
            <div
              v-for="actor of getSessionMembers(viewingSession)" :key="actor"
              class="member-chip"
              @click="openProfile(actor)"
            >
              <div class="member-avatar">{{ (getActorDisplayName(actor) || '?')[0].toUpperCase() }}</div>
              <span class="member-name">
                <span v-if="viewingSession.isDummy || actor === viewingSession.creatorActor">{{ getActorDisplayName(actor) || actor }}</span>
                <actor-handle v-else :actor="actor"/>
              </span>
              <span class="member-role" v-if="actor === viewingSession.creatorActor">organizer</span>
            </div>
          </div>
        </div>

        <div class="session-modal-actions">
          <button
            class="btn btn-primary"
            @click="joinSession(viewingSession)"
            :disabled="joiningGroup"
          >
            <template v-if="isMemberOf(viewingSession)">Open Chat →</template>
            <template v-else-if="viewingSession.isDummy">Open Demo Chat →</template>
            <template v-else>{{ joiningGroup ? 'Joining…' : 'Join Session' }}</template>
          </button>
          <!-- Leave button: only for joined, non-dummy sessions the user didn't create -->
          <button
            v-if="isMemberOf(viewingSession) && !viewingSession.isDummy && viewingSession.creatorActor !== $graffitiSession.value?.actor"
            class="btn btn-sm btn-danger"
            @click="leaveSession(viewingSession); closeViewSession()"
          >Leave Session</button>
          <button class="btn btn-sm" @click="closeViewSession()">Close</button>
        </div>
      </div>
    </div>

    <!-- ── Profile Modal ──────────────────────────────────────────── -->
    <div v-if="viewingProfile" class="profile-modal-overlay" @click.self="closeProfile()">
      <div class="profile-modal">
        <button class="profile-modal-close" @click="closeProfile()">✕</button>
        <div class="profile-modal-avatar">{{ viewingProfile.displayName?.[0]?.toUpperCase() }}</div>
        <div class="profile-modal-name">{{ viewingProfile.displayName }}</div>
        <div class="profile-modal-handle">
          <template v-if="viewingProfile.isDummy">demo account</template>
          <actor-handle v-else :actor="viewingProfile.actor"/>
        </div>
        <div class="tag-row" v-if="viewingProfile.tags && viewingProfile.tags.length" style="justify-content:center">
          <span class="tag-pill" v-for="t of viewingProfile.tags" :key="t">{{ t }}</span>
        </div>
        <div class="profile-modal-bio">{{ viewingProfile.bio || 'No bio set.' }}</div>
        <button
          class="btn btn-primary btn-sm"
          v-if="viewingProfile.actor !== $graffitiSession.value.actor"
          @click="openOrCreateDM(viewingProfile.actor, viewingProfile.displayName); closeProfile(); setTab('chats')"
        >
          Message
        </button>
      </div>
    </div>

    <!-- ── Toast notification ─────────────────────────────────────── -->
    <Transition name="toast">
      <div v-if="toastMsg" class="toast">{{ toastMsg }}</div>
    </Transition>

  </template>

</template>

<!-- ── ChatMessage component template ───────────────────────────── -->
<!-- Props: message (Object), isOwn (Boolean), isDeleting (Boolean) -->
<!-- Emits: delete(message), view-profile(actor)                     -->
<template id="chat-message-template">
  <div class="msg" :class="{own: isOwn}">
    <div class="msg-row">
      <span
        class="msg-actor"
        :style="(!isOwn && message.actor) ? 'cursor:pointer' : ''"
        @click="(!isOwn && message.actor) ? $emit('view-profile', message.actor) : null"
        v-if="message.isDummy"
      >{{ message.senderName }}</span>
      <span
        class="msg-actor"
        style="cursor:pointer"
        @click="$emit('view-profile', message.actor)"
        v-else
      ><actor-handle :actor="message.actor"/></span>
      <span class="msg-ts">{{ fmt(message.value.published) }}</span>
    </div>
    <div class="msg-bubble">{{ message.value.content }}</div>
    <div class="msg-acts" v-if="isOwn && !message.isDummy">
      <button class="btn btn-ghost" @click="$emit('delete', message)" :disabled="isDeleting">
        {{ isDeleting ? '…' : '✕ delete' }}
      </button>
    </div>
  </div>
</template>

</body>
</html>ß
